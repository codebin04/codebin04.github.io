{% assign locale = include.locale | default: site.locale %}

{%- comment -%} 카테고리 목록 {%- endcomment -%}
<section class="sidebar-box sidebar-box--categories">
  <h3 class="sidebar-box__title">Categories</h3>
  <ul class="sidebar-box__list">
    {% assign cats = site.categories | sort %}
    {% for cat in cats %}
      {% assign cat_name = cat[0] %}
      <li class="sidebar-box__item">
        <a class="sidebar-box__link" href="{{ '/categories/#' | append: cat_name | relative_url }}">
          {{ cat_name }} ({{ cat[1].size }})
        </a>
      </li>
    {% endfor %}
  </ul>
</section>
